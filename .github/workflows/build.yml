name: Build standalone binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
          - os: windows-2022
            target: windows-x64
          - os: windows-11-arm
            target: windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Read project version
        id: vars
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        run: |
          uv sync --group build
          BIN_NAME="fri3d-bulk-flasher-${{ steps.vars.outputs.version }}"
          uv run pyinstaller \
            --onefile \
            --name "$BIN_NAME" \
            --collect-submodules textual \
            --collect-submodules esptool \
            --collect-data esptool \
            --copy-metadata esptool \
            --collect-submodules serial \
            --clean --noconfirm \
            run.py

      - name: Smoke test
        shell: bash
        run: |
          BIN_NAME="fri3d-bulk-flasher-${{ steps.vars.outputs.version }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="dist/${BIN_NAME}.exe"
          else
            BIN="dist/${BIN_NAME}"
          fi
          "$BIN" --version
          "$BIN" --esptool version

      - name: Package
        shell: bash
        run: |
          cd dist
          BIN_NAME="fri3d-bulk-flasher-${{ steps.vars.outputs.version }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "${BIN_NAME}-${{ matrix.target }}.zip" "${BIN_NAME}.exe"
          else
            tar czf "${BIN_NAME}-${{ matrix.target }}.tar.gz" "${BIN_NAME}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: fri3d-bulk-flasher-${{ steps.vars.outputs.version }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
